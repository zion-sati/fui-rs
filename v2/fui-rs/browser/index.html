<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EffinDom Smoke Harness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .canvas-shell {
      position: relative;
      width: 320px;
      height: 220px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.35);
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      image-rendering: pixelated;
      background: transparent;
      outline: none;
    }
    canvas:focus, canvas:focus-visible { outline: none; }
  </style>
</head>
<body>
  <div class="canvas-shell" data-effindom-canvas-size-source>
    <canvas id="fui-canvas"></canvas>
  </div>
  <script src="./effindom-runtime-config.js"></script>
  <script src="./bridge.js"></script>
  <script type="module" src="./harness.js"></script>
</body>
</html>
