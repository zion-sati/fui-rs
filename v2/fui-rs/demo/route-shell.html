<!doctype html>
<html lang="en">
  <head>
    <base href="../" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUI-RS Demo</title>
    <style>
      {{LOADING_OVERLAY_STYLES}}
    </style>
    <style>
      :root {
        color-scheme: light dark;
        --shell-bg: #f7f4ec;
        --shell-text: #0f172a;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --shell-bg: #16181d;
          --shell-text: #e2e8f0;
        }
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at top, rgba(255, 255, 255, 0.5), transparent 38%), var(--shell-bg);
        color: var(--shell-text);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      }

      body {
        min-height: 100vh;
      }

      .canvas-shell {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: transparent;
        outline: none;
      }

      canvas:focus,
      canvas:focus-visible {
        outline: none;
      }
    </style>
  </head>
  <body>
    <div class="canvas-shell" id="fui-rs-demo-shell" data-effindom-canvas-size-source>
      <canvas id="fui-canvas"></canvas>
      {{LOADING_OVERLAY_BODY}}
    </div>
    <script src="./effindom-runtime-config.js"></script>
    <script src="./bridge.js"></script>
    <script src="./harness.js" type="module"></script>
  </body>
</html>
