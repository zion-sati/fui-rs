<div
  class="effindom-loading-overlay"
  id="effindom-loading-overlay"
  data-state="loading"
  aria-live="polite"
  aria-hidden="true"
  hidden>
  <div class="effindom-loading-card">
    <svg class="effindom-loading-visual" data-effindom-loading-visual viewBox="0 0 88 64" aria-hidden="true">
      <rect class="effindom-loading-frame" x="8" y="8" width="72" height="48" rx="12" />
      <circle class="effindom-loading-node" cx="24" cy="32" r="4" />
      <circle class="effindom-loading-node effindom-loading-node-b" cx="64" cy="32" r="4" />
    </svg>
    <p class="effindom-loading-kicker">EffinDOM</p>
    <h2 class="effindom-loading-title" id="effindom-loading-title" data-effindom-loading-title>Loading application</h2>
    <p class="effindom-loading-detail" id="effindom-loading-detail" data-effindom-loading-detail>Preparing the runtime...</p>
  </div>
</div>
<script>
  (() => {
    const overlay = document.getElementById('effindom-loading-overlay');
    if (!(overlay instanceof HTMLElement)) return;
    const detail = document.getElementById('effindom-loading-detail');
    const state = {
      timerId: null,
      visibleAtMs: null,
      detail: 'Runtime assets',
    };
    if (detail instanceof HTMLElement) detail.textContent = state.detail;
    window.addEventListener('effindom-loading-progress', (event) => {
      if (!(event instanceof CustomEvent)) return;
      const progress = event.detail;
      if (typeof progress?.label !== 'string' || typeof progress?.completed !== 'number' || typeof progress?.total !== 'number') return;
      state.detail = `${progress.label} ${progress.completed} / ${progress.total}`;
      if (detail instanceof HTMLElement) detail.textContent = state.detail;
    });
    state.timerId = window.setTimeout(() => {
      state.timerId = null;
      state.visibleAtMs = performance.now();
      overlay.dataset.state = 'loading';
      overlay.hidden = false;
      overlay.setAttribute('aria-hidden', 'false');
    }, 300);
    window.__effindomLoadingBootstrap = state;
  })();
</script>
