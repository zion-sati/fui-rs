name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' || github.event_name == 'pull_request_target')
        uses: cla-assistant/github-action@v2.5.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-cla: 'CLA.md'
          path-to-signatures: '.github/cla-signatures.json'
          branch: 'main'
          allowlist: 'zion-sati,bot*'
          custom-pr-sign-comment: "Thank you for your submission! Because FUI-RS utilizes a dual AGPL + Commercial licensing model, we require all contributors to sign our Contributor License Agreement before code can be merged. Please read our [CLA.md](https://github.com) and reply to this comment with the exact phrase below:\n\n`I have read the CLA Document and I hereby sign the CLA`"
