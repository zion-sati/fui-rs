name: FUI-RS Integration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: v2/fui-rs/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Resolve the current runtime release
        id: runtime
        run: |
          runtime_version="$(npm view @effindomv2/runtime dist-tags.latest)"
          node -e "if (!/^\\d+\\.\\d+\\.\\d+(?:-[0-9A-Za-z.-]+)?$/.test(process.argv[1])) process.exit(1)" "$runtime_version"
          echo "version=$runtime_version" >> "$GITHUB_OUTPUT"
      - name: Pin the tested runtime version
        env:
          RUNTIME_VERSION: ${{ steps.runtime.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const packagePath = 'v2/fui-rs/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.dependencies['@effindomv2/runtime'] = process.env.RUNTIME_VERSION;
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE
      - name: Install dependencies for the tested runtime
        run: |
          npm install --package-lock-only --ignore-scripts
          npm ci
      - name: Install all Playwright browsers
        run: npx playwright install --with-deps
      - name: Build the browser demo
        run: npm run build
      - name: Run the full browser integration suite
        run: npm run test:integration
